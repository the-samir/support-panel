<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorğunun statusu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #171717;
      --border: #262626;
      --text: #e8e8e8;
      --muted: #666;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --blue: #60a5fa;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .wrap { width: 100%; max-width: 480px; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .logo-text {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
    }

    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 2rem 0;
    }

    .error-state {
      text-align: center;
      color: var(--red);
      font-size: 14px;
      padding: 2rem 0;
    }

    .task-title {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 1.5rem;
      line-height: 1.3;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .status-badge.not-started { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
    .status-badge.in-progress { background: rgba(96,165,250,0.1); color: var(--blue); border: 1px solid rgba(96,165,250,0.3); }
    .status-badge.in-review { background: rgba(96,165,250,0.08); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }
    .status-badge.done { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .status-badge.on-hold { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }
    .status-badge.cancelled { background: rgba(248,113,113,0.08); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 6px 0;
    }

    .meta-label { color: var(--muted); }
    .meta-value { color: var(--text); }

    .priority-high { color: var(--red); }
    .priority-medium { color: var(--yellow); }
    .priority-low { color: var(--green); }

    .tracking-id {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Support Panel</span>
    </div>

    <div class="card" id="card">
      <div class="loading">Yüklənir...</div>
    </div>

    <a href="/" class="back-link">← Yeni sorğu göndər</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const trackingId = params.get('id');

    const statusMap = {
      'Not started': { label: 'Başlanmayıb', cls: 'not-started', icon: '○' },
      'In progress': { label: 'İcrada', cls: 'in-progress', icon: '◑' },
      'In Review': { label: 'Yoxlanılır', cls: 'in-review', icon: '◑' },
      'Done': { label: 'Tamamlandı', cls: 'done', icon: '●' },
      'On Hold': { label: 'Gözləmədə', cls: 'on-hold', icon: '◌' },
      'Cancelled': { label: 'Ləğv edildi', cls: 'cancelled', icon: '✕' },
    };

    function formatDate(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr);
      return d.toLocaleDateString('az-AZ', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    async function loadStatus() {
      const card = document.getElementById('card');

      if (!trackingId) {
        card.innerHTML = '<div class="error-state">Tracking ID tapılmadı</div>';
        return;
      }

      try {
        const res = await fetch(`/api/track?id=${trackingId}`);
        const data = await res.json();

        if (!data.success) {
          card.innerHTML = `<div class="error-state">${data.error || 'Sorğu tapılmadı'}</div>`;
          return;
        }

        const st = statusMap[data.status] || { label: data.status, cls: 'not-started', icon: '○' };
        const priorityLabels = { High: '🔴 Yüksək', Medium: '🟡 Orta', Low: '🟢 Aşağı' };
        const priorityCls = { High: 'priority-high', Medium: 'priority-medium', Low: 'priority-low' };

        card.innerHTML = `
          <div class="task-title">${data.taskName}</div>
          <div class="status-badge ${st.cls}">${st.icon} ${st.label}</div>
          <div class="divider"></div>
          ${data.priority ? `
          <div class="meta-row">
            <span class="meta-label">Prioritet</span>
            <span class="meta-value ${priorityCls[data.priority] || ''}">${priorityLabels[data.priority] || data.priority}</span>
          </div>` : ''}
          ${data.dueDate ? `
          <div class="meta-row">
            <span class="meta-label">Son tarix</span>
            <span class="meta-value">${formatDate(data.dueDate)}</span>
          </div>` : ''}
          <div class="meta-row">
            <span class="meta-label">Göndərildi</span>
            <span class="meta-value">${formatDate(data.createdTime)}</span>
          </div>
          <div class="tracking-id">ID: ${trackingId}</div>
        `;
      } catch (err) {
        card.innerHTML = `<div class="error-state">Bağlantı xətası</div>`;
      }
    }

    loadStatus();
  </script>
</body>
</html>
